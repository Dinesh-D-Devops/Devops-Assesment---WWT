apiVersion: apps/v1
kind: Deployment
metadata:
  name: mindmeld-api
  namespace: default
  labels:
    app: mindmeld-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mindmeld-api
  template:
    metadata:
      labels:
        app: mindmeld-api
    spec:
      containers:
      - name: api
        # The Jenkins pipeline replaces this with your actual ECR image URL
        image: REPLACE_ME_ECR_URI:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: REDIS_HOST
          # The Jenkins pipeline replaces this with the Terraform Redis output
          value: "REPLACE_ME_REDIS_ENDPOINT"
        
        # Security: Prevent the container from running as root
        securityContext:
          runAsNonRoot: true
          allowPrivilegeEscalation: false

        # Resource limits ensure the cluster autoscaler works properly
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"
            
        # Probes ensure traffic is only sent to healthy pods
        readinessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 20
